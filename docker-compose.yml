version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: ukk-hotel-db
    restart: always
    environment:
      MYSQL_DATABASE: drg_hotel
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root"]
      timeout: 5s
      retries: 10
      interval: 5s

  # Initializer service to run migrations and seeding before web apps start
  db-init:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ukk-hotel-db-init
    environment:
      - DATABASE_URL=mysql://root:@db:3306/drg_hotel
    command: sh -c "npx prisma db push && node prisma/seed.js"
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_RECAPTCHA_SITE_KEY: ${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-6Le_0jstAAAAAKFydyK9CXft0oDUKa0sMCg3hGbT}
    # container_name is removed to allow multiple instances (scaling)
    restart: always
    expose:
      - "3000" # Expose internally for load balancer
    environment:
      - DATABASE_URL=mysql://root:@db:3306/drg_hotel
      - JWT_SECRET=${JWT_SECRET:-drghotel_super_secret_jwt_key_2026}
      - APP_URL=${APP_URL:-http://10.10.10.11:8080}
      - MIDTRANS_SERVER_KEY=${MIDTRANS_SERVER_KEY:-Mid-server-U8FEIqKAaIL1fgWRRKLcX9ff}
      - MIDTRANS_CLIENT_KEY=${MIDTRANS_CLIENT_KEY:-Mid-client-Vz42tjsBUBQlAYmI}
      - NEXT_PUBLIC_RECAPTCHA_SITE_KEY=${NEXT_PUBLIC_RECAPTCHA_SITE_KEY:-6Le_0jstAAAAAKFydyK9CXft0oDUKa0sMCg3hGbT}
      - RECAPTCHA_SECRET_KEY=${RECAPTCHA_SECRET_KEY:-6Le_0jstAAAAAP1YK0x5tzA3ZPirOXSRRLs2e6hp}
      - GMAIL_USER=${GMAIL_USER:-yusufregan06@gmail.com}
      - GMAIL_APP_PASSWORD=${GMAIL_APP_PASSWORD:-ztlh nllz ikie rcsm}
    depends_on:
      db-init:
        condition: service_completed_successfully
    deploy:
      replicas: 3 # Scale to 3 instances

  lb:
    image: nginx:alpine
    container_name: ukk-hotel-lb
    restart: always
    ports:
      - "8080:80" # Map host port 3000 to nginx port 80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web

volumes:
  mysql_data:
